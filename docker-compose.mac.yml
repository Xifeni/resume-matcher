version: "3.8"

services:
  app:
    build: .
    container_name: flask_app
    ports:
      - "5001:5001"
    environment:
      - VLLM_URL=${VLLM_URL}

  frontend:
    build:
      context: ./resume-matcher-front
      dockerfile: Dockerfile
    container_name: vue_frontend
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=http://localhost:5001
    depends_on:
      - app
